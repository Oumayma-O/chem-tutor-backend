services:
  app:
    build: .
    image: chem-backend
    container_name: chem-backend
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync          # sync code → uvicorn --reload picks it up
          path: ./app
          target: /app/app
        - action: rebuild       # rebuild image when deps change
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
        - action: rebuild
          path: Dockerfile
        - action: sync+restart  # sync migrations and restart so alembic upgrade runs
          path: ./alembic
          target: /app/alembic
        - action: sync+restart  # restart to re-read new env vars
          path: .env
          target: /app/.env
